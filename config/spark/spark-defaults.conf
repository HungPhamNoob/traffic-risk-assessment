# =============================================================
# Spark Configuration for Road Accident Risk Platform
# Target: node3-batch (GCP VM)
# =============================================================

# ── Driver & Executor resources ──────────────────────────────
spark.driver.memory                  4g
spark.executor.memory                6g
spark.executor.cores                 4
spark.executor.instances             2

# ── Serialization (required by Sedona) ───────────────────────
spark.serializer                     org.apache.spark.serializer.KryoSerializer
spark.kryo.registrator               org.apache.sedona.core.serde.SedonaKryoRegistrator

# ── Sedona SQL extensions ─────────────────────────────────────
spark.sql.extensions                 org.apache.sedona.viz.sql.SedonaVizExtensions,org.apache.sedona.sql.SedonaSqlExtensions

# ── GCS Connector ────────────────────────────────────────────
# Uncomment và chỉnh path sau khi đặt JAR lên node3
# spark.jars                         /opt/spark/jars/gcs-connector-hadoop3-latest.jar,/opt/spark/jars/sedona-spark-shaded-3.0_2.12-1.7.0.jar,/opt/spark/jars/geotools-wrapper-1.7.0-28.2.jar,/opt/spark/jars/spark-avro_2.12-3.5.1.jar,/opt/spark/jars/postgresql-42.7.3.jar

spark.hadoop.fs.gs.impl              com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
spark.hadoop.fs.AbstractFileSystem.gs.impl com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS
spark.hadoop.google.cloud.auth.service.account.enable true
# Sử dụng Workload Identity trên GCE — không cần JSON key khi chạy trên GCP VM
# spark.hadoop.google.cloud.auth.service.account.json.keyfile /secrets/gcp-sa.json

# ── Parquet / Delta tuning ────────────────────────────────────
spark.sql.parquet.compression.codec  snappy
spark.sql.parquet.mergeSchema        false
spark.sql.hive.convertMetastoreParquet true

# ── Adaptive Query Execution ─────────────────────────────────
spark.sql.adaptive.enabled           true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.adaptive.skewJoin.enabled  true

# ── Shuffle partitions ────────────────────────────────────────
spark.sql.shuffle.partitions         200

# ── Checkpointing (GCS) ───────────────────────────────────────
spark.sparkContext.setCheckpointDir  gs://${GCS_BUCKET}/checkpoints/spark

# ── Event log (optional) ─────────────────────────────────────
# spark.eventLog.enabled             true
# spark.eventLog.dir                 gs://${GCS_BUCKET}/spark-logs/
