# Spark log4j2 configuration
# Giảm log noise từ Spark/Hadoop khi chạy batch jobs

rootLogger.level = WARN
rootLogger.appenderRef.stdout.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# ── Tắt bớt log từ các thư viện ─────────────────────────────────────────
logger.spark.name = org.apache.spark
logger.spark.level = WARN

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = WARN

logger.hive.name = org.apache.hive
logger.hive.level = ERROR

logger.jetty.name = org.eclipse.jetty
logger.jetty.level = WARN

logger.sedona.name = org.apache.sedona
logger.sedona.level = INFO

# ── Giữ log INFO cho code của dự án ──────────────────────────────────────
logger.project.name = processing.spark
logger.project.level = INFO
