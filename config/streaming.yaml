# Streaming Pipeline Configuration
# All settings can be overridden via environment variables

kafka:
  bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}"
  topics:
    raw: "tomtom.traffic.raw"
    enriched: "traffic.events.enriched"
    predictions: "traffic.risk.predictions"
    simulation_control: "simulation.control"
    dlq: "streaming.dlq"
  producer:
    acks: "all"
    retries: 3
    batch_size: 16384
    linger_ms: 10
  consumer:
    group_id: "flink-streaming"
    auto_offset_reset: "latest"
    enable_auto_commit: false

flink:
  checkpoint:
    interval_ms: "${FLINK_CHECKPOINT_INTERVAL:-30000}"
    mode: "EXACTLY_ONCE"
    timeout_ms: 600000
    storage_dir: "${FLINK_CHECKPOINT_DIR:-/tmp/flink-checkpoints}"
  watermark:
    allowed_lateness_ms: 300000  # 5 minutes
  restart:
    strategy: "fixed-delay"
    attempts: 3
    delay_ms: 10000

enrichment:
  grid:
    cell_size_meters: 100
    # Global defaults so TomTom US/UK regions are accepted. Override via env for demos.
    bounds:
      min_lat: -90.0
      max_lat: 90.0
      min_lon: -180.0
      max_lon: 180.0
  redis:
    enabled: true
    host: "${REDIS_HOST:-localhost}"
    port: "${REDIS_PORT:-6379}"
    db: 0
    timeout_ms: 2000
  postgis:
    enabled: true
    connection_string: "${POSTGIS_CONNECTION_STRING:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-accident_risk}}"
  weather:
    enabled: "${WEATHER_ENRICHMENT_ENABLED:-true}"
    endpoint: "${OPEN_METEO_ENDPOINT:-https://api.open-meteo.com/v1/forecast}"
    timeout_seconds: "${WEATHER_TIMEOUT_SECONDS:-3}"

ml:
  serving:
    mode: "rest"  # rest | mojo
    endpoint: "${MLFLOW_SERVING_ENDPOINT:-http://localhost:5000/invocations}"
    timeout_seconds: 5
    fallback_risk_score: -1
    fallback_risk_level: null
    fallback_status: "FAILED"

sink:
  postgis:
    enabled: "${POSTGIS_SINK_ENABLED:-false}"

producer:
  simulated:
    enabled: "${SIMULATED_PRODUCER_ENABLED:-true}"
    throughput_per_second: 10
    replay_from: "data/sample/"  # Path to sample data for replay
  tomtom:
    enabled: "${TOMTOM_PRODUCER_ENABLED:-false}"
    api_key: "${TOMTOM_API_KEY:-}"
    bbox: "${TOMTOM_BBOX:-}"
    bboxes: "${TOMTOM_BBOXES:-US:New York:-74.25909,40.477399,-73.700181,40.917577;UK:London:-0.510375,51.28676,0.334015,51.691874}"
    language: "${TOMTOM_LANGUAGE:-en-US}"
    time_validity: "${TOMTOM_TIME_VALIDITY:-present}"
    endpoints:
      - "${TOMTOM_ENDPOINT:-https://api.tomtom.com/traffic/services/5/incidentDetails}"

metrics:
  enabled: true
  prometheus:
    enabled: "${PROMETHEUS_ENABLED:-false}"
    port: 8001
  log_level: "${STREAMING_LOG_LEVEL:-INFO}"
