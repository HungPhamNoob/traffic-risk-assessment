services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: local-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-capstone_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-capstone} -d ${POSTGRES_DB:-capstone_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - traffic-local
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: local-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - traffic-local
    restart: unless-stopped

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka-1
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data_1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 45s
    networks:
      - traffic-local
    restart: unless-stopped

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka-2
    ports:
      - "9093:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data_2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 45s
    networks:
      - traffic-local
    restart: unless-stopped

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka-3
    ports:
      - "9094:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data_3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 45s
    networks:
      - traffic-local
    restart: unless-stopped

  kafka-topic-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka-topic-init
    command: >
      bash -c "
        kafka-topics --bootstrap-server kafka-1:9092,kafka-2:9092,kafka-3:9092
        --create --if-not-exists
        --topic ${KAFKA_TOPIC_RAW:-traffic.us.raw}
        --partitions 1
        --replication-factor 3 &&
        kafka-topics --bootstrap-server kafka-1:9092,kafka-2:9092,kafka-3:9092
        --describe --topic ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      "
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - traffic-local
    restart: "no"

  producer-1:
    image: python:3.10-slim
    container_name: local-producer-0
    working_dir: /app
    command: >
      bash -c "
        pip install --no-cache-dir confluent-kafka python-dotenv &&
        python us_replay_producer.py
      "
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      US_PIPELINE_REPLAY_PATH: /workspace/data/split/us_pipeline_from_2020.csv
      STREAM_MAX_RECORDS: ${STREAM_MAX_RECORDS:-1000}
      STREAM_THROTTLE_SECONDS: ${STREAM_THROTTLE_SECONDS:-0.0}
      TOTAL_PRODUCERS: ${TOTAL_PRODUCERS:-3}
      PRODUCER_INDEX: "0"
      PRODUCER_FLUSH_EVERY_N_RECORDS: ${PRODUCER_FLUSH_EVERY_N_RECORDS:-500}
    volumes:
      - ./ingestion/kafka/us_producer.py:/app/us_replay_producer.py:ro
      - ./:/workspace:ro
    depends_on:
      kafka-topic-init:
        condition: service_completed_successfully
    networks:
      - traffic-local
    profiles:
      - replay
    restart: "no"

  producer-2:
    extends:
      service: producer-1
    container_name: local-producer-1
    environment:
      PRODUCER_INDEX: "1"

  producer-3:
    extends:
      service: producer-1
    container_name: local-producer-2
    environment:
      PRODUCER_INDEX: "2"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: local-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./data/simulation/mlruns:/mlruns
      - ./data/simulation/mlflow-artifacts:/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --serve-artifacts
      --artifacts-destination /artifacts
    networks:
      - traffic-local
    restart: unless-stopped

  fastapi:
    build:
      context: ./dashboard/backend
    image: traffic-risk-fastapi:local
    container_name: local-fastapi
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-capstone_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PREDICTION_TABLE: ${POSTGRES_PREDICTION_TABLE:-traffic_risk_predictions}
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      FLINK_CHECKPOINT_DIR: ${FLINK_CHECKPOINT_DIR:-file://data/simulation/checkpoints/flink}
      FLINK_CHECKPOINT_INTERVAL: ${FLINK_CHECKPOINT_INTERVAL:-30000}
      GOLD_RETRAIN_PATH: ${GOLD_RETRAIN_PATH:-data/simulation/gold/features/retrain}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_SERVING_ENDPOINT: ${MLFLOW_SERVING_ENDPOINT:-http://localhost:5001/invocations}
      ML_MODEL_NAME: ${ML_MODEL_NAME:-traffic-risk-model}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - traffic-local
    restart: unless-stopped

  spark-master:
    image: apache/spark:3.5.0
    container_name: local-spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SILVER_FEATURES_PATH: ${SILVER_FEATURES_PATH:-data/simulation/silver/flink_features}
      GOLD_RETRAIN_PATH: ${GOLD_RETRAIN_PATH:-data/simulation/gold/features/retrain}
      SPARK_WRITE_PARTITIONS: ${SPARK_WRITE_PARTITIONS:-1}
    volumes:
      - ./:/opt/traffic:ro
      - ./data:/data
    networks:
      - traffic-local
    profiles:
      - batch
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.0
    container_name: local-spark-worker
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_MEMORY: 1g
    volumes:
      - ./:/opt/traffic:ro
      - ./data:/data
    depends_on:
      - spark-master
    networks:
      - traffic-local
    profiles:
      - batch
    restart: on-failure

  airflow-db:
    image: postgres:15-alpine
    container_name: local-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow123
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - traffic-local
    profiles:
      - orchestration
    restart: unless-stopped

  airflow:
    image: apache/airflow:2.9.0-python3.10
    container_name: local-airflow
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-123}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-123}
      PROJECT_ROOT: /opt/traffic
    volumes:
      - ./orchestration/dags:/opt/airflow/dags:ro
      - ./data/simulation/airflow-logs:/opt/airflow/logs
      - ./:/opt/traffic:ro
    depends_on:
      airflow-db:
        condition: service_healthy
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create --username ${AIRFLOW_USER:-admin} --password ${AIRFLOW_PASSWORD:-123}
        --firstname Admin --lastname User --role Admin --email admin@local 2>/dev/null || true &&
        airflow webserver &
        airflow scheduler
      "
    networks:
      - traffic-local
    profiles:
      - orchestration
    restart: unless-stopped

networks:
  traffic-local:
    driver: bridge
    name: traffic-local

volumes:
  postgres_data:
  redis_data:
  kafka_data_1:
  kafka_data_2:
  kafka_data_3:
  airflow_pg_data:
