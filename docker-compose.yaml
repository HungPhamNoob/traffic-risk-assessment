services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: local-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-capstone_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-capstone} -d ${POSTGRES_DB:-capstone_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - traffic-local
    restart: unless-stopped
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: local-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - traffic-local
    restart: unless-stopped
    mem_limit: 128m

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: local-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: -Xms128m -Xmx256m
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep 'Mode:'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - traffic-local
    restart: unless-stopped
    mem_limit: 384m

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: -Xms128m -Xmx384m
    volumes:
      - kafka_data_1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 45s
    networks:
      - traffic-local
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 768m

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka-2
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:29092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: -Xms128m -Xmx384m
    volumes:
      - kafka_data_2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 45s
    networks:
      - traffic-local
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 768m

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka-3
    ports:
      - "9094:9092"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:29092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: -Xms128m -Xmx384m
    volumes:
      - kafka_data_3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 45s
    networks:
      - traffic-local
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 768m

  kafka-topic-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka-topic-init
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      KAFKA_TOPIC_TOMTOM_RAW: ${KAFKA_TOPIC_TOMTOM_RAW:-traffic.tomtom.raw}
    command: |
      bash -ec '
        BOOTSTRAP_SERVERS="$${KAFKA_BOOTSTRAP_SERVERS}"
        TOPICS="$${KAFKA_TOPIC_RAW} $${KAFKA_TOPIC_TOMTOM_RAW}"

        echo "Waiting for Kafka brokers at $${BOOTSTRAP_SERVERS}."
        for i in $(seq 1 30); do
          if kafka-broker-api-versions --bootstrap-server "$${BOOTSTRAP_SERVERS}" >/dev/null 2>&1; then
            break
          fi
          echo "Kafka not ready yet ($${i}/30)."
          sleep 2
        done

        if ! kafka-broker-api-versions --bootstrap-server "$${BOOTSTRAP_SERVERS}" >/dev/null 2>&1; then
          echo "Kafka brokers not reachable after waiting. Exiting for restart."
          exit 1
        fi

        for TOPIC_NAME in $${TOPICS}; do
          echo "Creating Kafka topic $${TOPIC_NAME} with one partition and three replicas."
          kafka-topics --bootstrap-server "$${BOOTSTRAP_SERVERS}" --create --if-not-exists --topic "$${TOPIC_NAME}" --partitions 1 --replication-factor 3

          echo "Validating Kafka topic $${TOPIC_NAME}."
          kafka-topics --bootstrap-server "$${BOOTSTRAP_SERVERS}" --describe --topic "$${TOPIC_NAME}"
        done

        echo "Kafka topic init complete. Holding container open."
        tail -f /dev/null
      '
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - traffic-local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server \"$${KAFKA_BOOTSTRAP_SERVERS}\" --describe --topic \"$${KAFKA_TOPIC_RAW}\" >/dev/null 2>&1 && kafka-topics --bootstrap-server \"$${KAFKA_BOOTSTRAP_SERVERS}\" --describe --topic \"$${KAFKA_TOPIC_TOMTOM_RAW}\" >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  producer-1:
    image: python:3.10-slim
    container_name: local-producer-0
    working_dir: /app
    command: >
      bash -c "
        pip install --no-cache-dir confluent-kafka python-dotenv &&
        python us_replay_producer.py
      "
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      US_PIPELINE_REPLAY_PATH: /workspace/data/split/us_pipeline_from_2020.csv
      STREAM_MAX_RECORDS: ${STREAM_MAX_RECORDS:-1000}
      STREAM_THROTTLE_SECONDS: ${STREAM_THROTTLE_SECONDS:-0.0}
      TOTAL_PRODUCERS: ${TOTAL_PRODUCERS:-3}
      PRODUCER_INDEX: "0"
      PRODUCER_FLUSH_EVERY_N_RECORDS: ${PRODUCER_FLUSH_EVERY_N_RECORDS:-500}
    volumes:
      - ./ingestion/kafka/us_producer.py:/app/us_replay_producer.py:ro
      - ./:/workspace:ro
    depends_on:
      kafka-topic-init:
        condition: service_healthy
    networks:
      - traffic-local
    profiles:
      - replay
    restart: "no"
    mem_limit: 256m

  producer-2:
    extends:
      service: producer-1
    container_name: local-producer-1
    environment:
      PRODUCER_INDEX: "1"

  producer-3:
    extends:
      service: producer-1
    container_name: local-producer-2
    environment:
      PRODUCER_INDEX: "2"

  tomtom-producer:
    image: python:3.10-slim
    container_name: local-tomtom-producer
    working_dir: /app
    command: >
      bash -c "
        pip install --no-cache-dir confluent-kafka python-dotenv requests &&
        python tomtom_producer.py
      "
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_TOMTOM_RAW:-traffic.tomtom.raw}
      TOMTOM_API: ${TOMTOM_API:-}
      TOMTOM_API_KEY: ${TOMTOM_API_KEY:-}
      TOMTOM_ENDPOINT: ${TOMTOM_ENDPOINT:-https://api.tomtom.com/traffic/services/5/incidentDetails}
      TOMTOM_BBOX: ${TOMTOM_BBOX:--74.25909,40.477399,-73.700181,40.917577}
      TOMTOM_BBOXES: ${TOMTOM_BBOXES:-US:New_York:-74.25909,40.477399,-73.700181,40.917577}
      TOMTOM_LANGUAGE: ${TOMTOM_LANGUAGE:-en-US}
      TOMTOM_TIME_VALIDITY: ${TOMTOM_TIME_VALIDITY:-present}
      TOMTOM_POLL_SECONDS: ${TOMTOM_POLL_SECONDS:-60}
      TOMTOM_RUN_ONCE: ${TOMTOM_RUN_ONCE:-false}
      STREAM_MAX_RECORDS: ${STREAM_MAX_RECORDS:-0}
      PRODUCER_FLUSH_EVERY_N_RECORDS: ${PRODUCER_FLUSH_EVERY_N_RECORDS:-500}
      STREAMING_LOG_LEVEL: ${STREAMING_LOG_LEVEL:-INFO}
    volumes:
      - ./ingestion/kafka/tomtom_producer.py:/app/tomtom_producer.py:ro
    depends_on:
      kafka-topic-init:
        condition: service_healthy
    networks:
      - traffic-local
    profiles:
      - tomtom
    restart: unless-stopped
    mem_limit: 256m

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: local-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./data/simulation/mlruns:/mlruns
      - ./data/simulation/mlflow-artifacts:/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --serve-artifacts
      --artifacts-destination /artifacts
    networks:
      - traffic-local
    restart: unless-stopped
    mem_limit: 768m

  fastapi:
    build:
      context: ./dashboard/backend
    image: traffic-risk-fastapi:local
    container_name: local-fastapi
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-capstone_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PREDICTION_TABLE: ${POSTGRES_PREDICTION_TABLE:-traffic_risk_predictions}
      POSTGRES_US_PREDICTION_TABLE: ${POSTGRES_US_PREDICTION_TABLE:-traffic_risk_predictions}
      POSTGRES_TOMTOM_TABLE: ${POSTGRES_TOMTOM_TABLE:-traffic_tomtom_incidents}
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      FLINK_CHECKPOINT_DIR: ${FLINK_CHECKPOINT_DIR:-file://data/simulation/checkpoints/flink}
      FLINK_CHECKPOINT_INTERVAL: ${FLINK_CHECKPOINT_INTERVAL:-30000}
      GOLD_RETRAIN_PATH: ${GOLD_RETRAIN_PATH:-data/simulation/gold/features/retrain}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_SERVING_ENDPOINT: ${MLFLOW_SERVING_ENDPOINT:-http://localhost:5001/invocations}
      ML_MODEL_NAME: ${ML_MODEL_NAME:-traffic-risk-model}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - traffic-local
    restart: unless-stopped
    mem_limit: 512m

  spark-master:
    image: apache/spark:3.5.0
    container_name: local-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SILVER_FEATURES_PATH: ${SILVER_FEATURES_PATH:-data/simulation/silver/flink_features}
      GOLD_RETRAIN_PATH: ${GOLD_RETRAIN_PATH:-data/simulation/gold/features/retrain}
      GOLD_RETRAIN_PARQUET_PATH: ${GOLD_RETRAIN_PARQUET_PATH:-data/simulation/gold/features/retrain/parquet}
      GOLD_RETRAIN_CSV_PATH: ${GOLD_RETRAIN_CSV_PATH:-data/simulation/gold/features/retrain/csv}
      SPARK_WRITE_PARTITIONS: ${SPARK_WRITE_PARTITIONS:-1}
    volumes:
      - ./:/opt/traffic:ro
      - ./data:/data
    networks:
      - traffic-local
    profiles:
      - batch
    restart: unless-stopped
    mem_limit: 768m

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: local-spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-1}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-768m}
    volumes:
      - ./:/opt/traffic:ro
      - ./data:/data
    depends_on:
      - spark-master
    networks:
      - traffic-local
    profiles:
      - batch
    restart: on-failure
    mem_limit: 1g

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: local-spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-1}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-768m}
    volumes:
      - ./:/opt/traffic:ro
      - ./data:/data
    depends_on:
      - spark-master
    networks:
      - traffic-local
    profiles:
      - batch
    restart: on-failure
    mem_limit: 1g

  spark-worker-3:
    image: apache/spark:3.5.0
    container_name: local-spark-worker-3
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-1}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-768m}
    volumes:
      - ./:/opt/traffic:ro
      - ./data:/data
    depends_on:
      - spark-master
    networks:
      - traffic-local
    profiles:
      - batch
    restart: on-failure
    mem_limit: 1g

  airflow-db:
    image: postgres:15-alpine
    container_name: local-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow123
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - traffic-local
    profiles:
      - orchestration
    restart: unless-stopped

  airflow:
    image: apache/airflow:2.9.0-python3.10
    container_name: local-airflow
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-123}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-123}
      PROJECT_ROOT: /opt/traffic
    volumes:
      - ./orchestration/dags:/opt/airflow/dags:ro
      - ./data/simulation/airflow-logs:/opt/airflow/logs
      - ./:/opt/traffic:ro
    depends_on:
      airflow-db:
        condition: service_healthy
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create --username ${AIRFLOW_USER:-admin} --password ${AIRFLOW_PASSWORD:-123}
        --firstname Admin --lastname User --role Admin --email admin@local 2>/dev/null || true &&
        airflow webserver &
        airflow scheduler
      "
    networks:
      - traffic-local
    profiles:
      - orchestration
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: local-blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./config/monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    networks:
      - traffic-local
    restart: unless-stopped
    mem_limit: 128m

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: local-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/monitoring/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-7}d"
    depends_on:
      fastapi:
        condition: service_healthy
      blackbox-exporter:
        condition: service_started
    networks:
      - traffic-local
    restart: unless-stopped
    mem_limit: 256m

  grafana:
    image: grafana/grafana:10.4.1
    container_name: local-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - traffic-local
    restart: unless-stopped
    mem_limit: 256m

networks:
  traffic-local:
    driver: bridge
    name: traffic-local

volumes:
  postgres_data:
  redis_data:
  kafka_data_1:
  kafka_data_2:
  kafka_data_3:
  zookeeper_data:
  zookeeper_log:
  airflow_pg_data:
  prometheus_data:
  grafana_data:
