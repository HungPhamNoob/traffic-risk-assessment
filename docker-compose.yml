version: '3.8'

# ==================== DEFAULT: CHỈ CHẠY CORE ====================
# Dùng: docker-compose up -d
# Để chạy thêm: docker-compose --profile stream up -d

services:
  # ========== CORE LAYER (luôn chạy) ==========
  postgres-postgis:
    image: postgis/postgis:15-3.3-alpine
    container_name: dev-postgres
    environment:
      POSTGRES_USER: capstone
      POSTGRES_PASSWORD: capstone123
      POSTGRES_DB: capstone_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c max_connections=20
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capstone -d capstone_dev"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: unless-stopped
    profiles:
      - core

  redis:
    image: redis:7-alpine
    container_name: dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - capstone-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 2s
      retries: 2
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: unless-stopped
    profiles:
      - core

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z-alpine
    container_name: dev-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console (có thể disable nếu cần tiết kiệm port)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 2
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: unless-stopped
    profiles:
      - core

  # ========== STREAM PROFILE (bật khi cần test real-time) ==========
  kafka:
    image: apache/kafka:3.6.1-alpine
    container_name: dev-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kafka-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1  # Giảm cho dev
      KAFKA_RETENTION_MS: 3600000  # 1 hour cho dev
    volumes:
      - kafka_data:/tmp/kafka-logs
    networks:
      - capstone-dev
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/9092'"]
      interval: 30s
      timeout: 10s
      retries: 2
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - stream

  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11-alpine
    container_name: dev-flink-jm
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 0  # Disable cho dev
        execution.checkpointing.mode: OFF
    volumes:
      - flink_jm_data:/tmp/flink-checkpoints
      - ./processing/flink:/opt/flink/usrlib:ro
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - stream

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11-alpine
    container_name: dev-flink-tm
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 1
        taskmanager.memory.process.size: 512m
        state.backend: hashmap  # Nhẹ hơn RocksDB cho dev
    volumes:
      - ./processing/flink:/opt/flink/usrlib:ro
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - stream

  # ========== BATCH PROFILE (bật khi cần test Spark/Sedona) ==========
  spark-master:
    image: bitnami/spark:3.5.1-debian-12
    container_name: dev-spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./processing/spark:/opt/spark/work-dir:ro
      - spark_data:/tmp/spark-work
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - batch

  spark-worker:
    image: bitnami/spark:3.5.1-debian-12
    container_name: dev-spark-worker
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=512m
      - SPARK_NO_DAEMONIZE=true
      - SPARK_DRIVER_MEMORY=256m
      - SPARK_EXECUTOR_MEMORY=256m
    volumes:
      - ./processing/spark:/opt/spark/work-dir:ro
      - ./data:/data:ro
      - spark_data:/tmp/spark-work
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - batch

  # ========== ORCHESTRATION PROFILE (bật khi cần test Airflow) ==========
  airflow:
    image: apache/airflow:2.7.3-python3.10
    container_name: dev-airflow
    ports:
      - "8082:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://capstone:capstone123@postgres-postgis:5432/capstone_dev
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./orchestration/dags:/opt/airflow/dags:ro
      - ./orchestration/logs:/opt/airflow/logs
      - ./data:/data:ro
    depends_on:
      postgres-postgis:
        condition: service_healthy
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@local &&
        airflow webserver &
        airflow scheduler
      "
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - orchestration

  # ========== ML PROFILE (bật khi cần test MLflow) ==========
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2-alpine
    container_name: dev-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./ml/mlruns:/mlruns
      - mlflow_data:/models
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlruns/mlflow.db --default-artifact-root /models
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - ml

  # ========== MONITORING PROFILE (bật khi cần demo Grafana) ==========
  prometheus:
    image: prom/prometheus:v2.48.0-alpine
    container_name: dev-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=1d'  # Rất ngắn cho dev
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.2-alpine
    container_name: dev-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=  # Không install plugin thêm cho nhẹ
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - monitoring

  # ========== APP PLACEHOLDER (cho Huy test API) ==========
  fastapi-app:
    build:
      context: .
      dockerfile: dashboard/backend/Dockerfile.dev  # Dùng image dev nhẹ hơn
    container_name: dev-fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://capstone:capstone123@postgres-postgis:5432/capstone_dev
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MINIO_ENDPOINT=http://minio:9000
      - ENV=development
    volumes:
      - ./dashboard/backend:/app:ro
      - ./data:/data:ro
    depends_on:
      - postgres-postgis
      - redis
    networks:
      - capstone-dev
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 2
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    restart: on-failure
    profiles:
      - app

networks:
  capstone-dev:
    driver: bridge
    name: capstone-dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
  kafka_data:
  flink_jm_data:
  spark_data:
  mlflow_data:
  prometheus_data:
  grafana_data: