name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_ZONE: us-central1-a

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r dashboard/backend/requirements.txt
      
      - name: Run linters
        run: |
          black --check . --exclude=venv
          flake8 . --exclude=venv,.venv
      
      - name: Run unit tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  build-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard/backend
          push: true
          tags: gcr.io/${{ env.GCP_PROJECT_ID }}/fastapi:${{ github.sha }}
      
      - name: Build and push Spark worker image (if needed)
        uses: docker/build-push-action@v5
        with:
          context: ./processing/spark
          push: true
          tags: gcr.io/${{ env.GCP_PROJECT_ID }}/spark-worker:${{ github.sha }}

  deploy-staging:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Deploy to Node 1 (Control)
        run: |
          gcloud compute ssh node1-control --zone=$GCP_ZONE --project=$GCP_PROJECT_ID --quiet --command="
            cd /opt/capstone &&
            git pull origin develop &&
            cd deployment/node1-control &&
            docker-compose pull &&
            docker-compose up -d
          "
      
      - name: Smoke test
        run: |
          # Wait for services to be ready
          sleep 30
          curl -f http://$(gcloud compute instances describe node1-control --zone=$GCP_ZONE --format='get(networkInterfaces[0].accessConfigs[0].natIP)')/health || exit 1

  deploy-production:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Production deploy placeholder
        run: |
          echo "🔐 Production deploy requires manual approval"
          echo "✅ Staging validated: ${{ needs.deploy-staging.result }}"
          # TODO: Add production deploy steps after staging sign-off