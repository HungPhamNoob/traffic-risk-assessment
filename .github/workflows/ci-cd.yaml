# ============================================================
# .github/workflows/ci-cd.yaml
# CI/CD Pipeline for Road Accident Risk Analysis Platform
# ============================================================
# Triggers:
#   - Push to main/develop/hung1 -> run full pipeline
#   - Pull request to main/develop/hung1 -> run lint + test only
# 
# Auto-retry: Each job is wrapped with max 3 attempts via
# nick-fields/retry action for resilience against transient
# network/VM/cloud failures.
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, hung1 ]
  pull_request:
    branches: [ main, develop, hung1 ]

concurrency:
  group: traffic-cicd-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# Environment variables (not secrets)
# ============================================================
env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  GCP_ZONE: us-central1-a

# ============================================================
# Jobs
# ============================================================
jobs:

  # ==========================================================
  # Job 1: Lint and Test
  # Runs on every push and pull request
  # ==========================================================
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code from repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python and dependencies
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pandas numpy pyyaml requests python-dotenv
          pip install fastapi email-validator pydantic pydantic-settings prometheus-client psycopg2-binary scikit-learn pyarrow

      # Step 3: Run unit tests
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      # Step 4: Check Python syntax without importing heavy runtime services
      - name: Compile Python files
        run: |
          python -m compileall dashboard/backend/app processing ingestion ml/dataset ml/training orchestration -q

      - name: Ensure Docker Compose tooling
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io
          fi
          if ! docker compose version >/dev/null 2>&1; then
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-plugin
          fi
          docker compose version

      # Step 5: Validate Docker Compose files used by local and GCP deployments
      - name: Validate Docker Compose files
        run: |
          docker compose --env-file .env.example --file docker-compose.yaml config --quiet
          docker compose --env-file .env.cloud --file deployment/node1-control/docker-compose.yaml config --quiet
          docker compose --env-file .env.cloud --file deployment/node2-streaming/docker-compose.yaml config --quiet
          docker compose --env-file .env.cloud --file deployment/node3-batch/docker-compose.yaml config --quiet

  # ==========================================================
  # Job 2: Build Docker Images
  # Only runs on push to main/develop (not on pull requests)
  # ==========================================================
  build-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository
        run: |
          if ! gcloud artifacts repositories describe capstone \
            --location="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud artifacts repositories create capstone \
              --repository-format=docker \
              --location="${GCP_REGION}" \
              --description="Capstone Docker images" \
              --project="${GCP_PROJECT_ID}"
          fi

      # Step 3: Login to Google Artifact Registry (Docker)
      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      # Step 4: Build and push FastAPI image
      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dashboard/backend/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/capstone/fastapi:${{ github.sha }}
            us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/capstone/fastapi:latest

  # ==========================================================
  # Job 3: Deploy to Cloud VMs
  # Only runs on push to main/develop/hung1
  # ==========================================================
  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      # Step 3: Setup gcloud CLI
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure GCP infrastructure
        run: |
          bash scripts/gcp/setup_gcp.sh

      - name: Prepare VM SSH key
        env:
          HUNG_SSH_PRIVATE_KEY: ${{ secrets.HUNG_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          python - <<'PY'
          import os
          from pathlib import Path

          key = os.environ["HUNG_SSH_PRIVATE_KEY"].strip()
          if "\\n" in key and "\n" not in key:
              key = key.replace("\\n", "\n")
          key = key.replace("\r\n", "\n").replace("\r", "\n")
          if not key.endswith("\n"):
              key += "\n"

          key_path = Path.home() / ".ssh" / "hung_vm_key"
          key_path.write_text(key, encoding="utf-8")
          key_path.chmod(0o600)
          PY
          ssh-keygen -y -f ~/.ssh/hung_vm_key >/dev/null
          echo "SUCCESS: VM SSH key installed and parsed for deploy job."

      - name: Install VM SSH public keys
        run: |
          SSH_USER="${{ vars.HUNG_SSH_USER }}"
          SSH_USER="${SSH_USER:-runner}"
          PUBLIC_KEY="$(ssh-keygen -y -f ~/.ssh/hung_vm_key)"

          for VM_NAME in node1-control node2-streaming node3-batch; do
            echo "Installing deploy public key for ${SSH_USER}@${VM_NAME}."
            gcloud compute instances add-metadata "${VM_NAME}" \
              --zone="${GCP_ZONE}" \
              --project="${GCP_PROJECT_ID}" \
              --metadata="enable-oslogin=FALSE,block-project-ssh-keys=TRUE,ssh-keys=${SSH_USER}:${PUBLIC_KEY} ${SSH_USER}"
          done

          echo "SUCCESS: VM SSH metadata now matches HUNG_SSH_PRIVATE_KEY."

      - name: Upload .env.cloud to GCS
        run: |
          echo "=== Uploading .env.cloud to GCS ==="
          echo '${{ secrets.ENV_CLOUD }}' > .env.cloud
          SSH_USER="${{ vars.HUNG_SSH_USER }}"
          SSH_USER="${SSH_USER:-hung}"
          {
            printf '\n# CI/CD deployment overrides. These values keep stale GitHub secret content from pointing VMs at retired buckets.\n'
            NODE1_INTERNAL_IP="$(gcloud compute instances describe node1-control --zone="$GCP_ZONE" --project="$GCP_PROJECT_ID" --format='get(networkInterfaces[0].networkIP)')"
            NODE2_INTERNAL_IP="$(gcloud compute instances describe node2-streaming --zone="$GCP_ZONE" --project="$GCP_PROJECT_ID" --format='get(networkInterfaces[0].networkIP)')"
            NODE3_INTERNAL_IP="$(gcloud compute instances describe node3-batch --zone="$GCP_ZONE" --project="$GCP_PROJECT_ID" --format='get(networkInterfaces[0].networkIP)')"
            printf 'GCP_PROJECT_ID=%s\n' "$GCP_PROJECT_ID"
            printf 'GCS_BUCKET_BRONZE=big-data-group-4-bronze\n'
            printf 'GCS_BUCKET_SILVER=big-data-group-4-silver\n'
            printf 'GCS_BUCKET_GOLD=big-data-group-4-gold\n'
            printf 'NODE1_INTERNAL_IP=%s\n' "$NODE1_INTERNAL_IP"
            printf 'NODE2_INTERNAL_IP=%s\n' "$NODE2_INTERNAL_IP"
            printf 'NODE3_INTERNAL_IP=%s\n' "$NODE3_INTERNAL_IP"
            printf 'POSTGRES_HOST=%s\n' "$NODE1_INTERNAL_IP"
            printf 'POSTGRES_US_PREDICTION_TABLE=traffic_risk_predictions\n'
            printf 'POSTGRES_TOMTOM_TABLE=traffic_tomtom_incidents\n'
            printf 'US_TRAIN_OFFLINE_PATH=gs://big-data-group-4-bronze/process/us_train_offline_before_2020.csv\n'
            printf 'US_PIPELINE_REPLAY_PATH=gs://big-data-group-4-bronze/process/us_pipeline_from_2020.csv\n'
            printf 'SILVER_FEATURES_PATH=gs://big-data-group-4-silver/process/flink_features\n'
            printf 'GOLD_RETRAIN_PATH=gs://big-data-group-4-gold/features/retrain\n'
            printf 'GOLD_RETRAIN_PARQUET_PATH=gs://big-data-group-4-gold/features/retrain/parquet\n'
            printf 'GOLD_RETRAIN_CSV_PATH=gs://big-data-group-4-gold/features/retrain/csv\n'
            printf 'MLFLOW_TRACKING_URI=http://%s:5000\n' "$NODE1_INTERNAL_IP"
            printf 'MLFLOW_ARTIFACT_ROOT=gs://big-data-group-4-ml-artifacts\n'
            printf 'MLFLOW_SERVING_ENDPOINT=http://%s:5001/invocations\n' "$NODE1_INTERNAL_IP"
            printf 'MLFLOW_GUNICORN_TIMEOUT_SECONDS=300\n'
            printf 'MLFLOW_GUNICORN_WORKERS=2\n'
            printf 'FLINK_LOCAL_CHECKPOINT_DIR=file:///opt/flink/checkpoints/unified-traffic-streaming\n'
            printf 'FLINK_CHECKPOINT_TIMEOUT=1800000\n'
            printf 'FLINK_CHECKPOINT_MIN_PAUSE=120000\n'
            printf 'FLINK_TOLERABLE_FAILED_CHECKPOINTS=10\n'
            printf 'FLINK_TMP_DIR=/opt/flink/tmp\n'
            printf 'ML_BATCH_SIZE=250\n'
            printf 'SILVER_FLUSH_EVERY_N=2000\n'
            printf 'TOMTOM_CONSUMER_GROUP=tomtom-live-postgres-consumer\n'
            printf 'TOMTOM_CONSUMER_AUTO_OFFSET_RESET=earliest\n'
            printf 'TOMTOM_CONSUMER_POLL_TIMEOUT_SECONDS=1\n'
            printf 'TOMTOM_FLUSH_INTERVAL_SECONDS=15\n'
            printf 'STREAM_LOOP_FOREVER=false\n'
            printf 'FASTAPI_SSH_KEY_PATH=/opt/traffic/secrets/inter_node_google_compute_engine\n'
            printf 'TOMTOM_BBOXES=US:New_York:-74.25909,40.477399,-73.700181,40.917577\n'
          } >> .env.cloud
          printf '\nFASTAPI_IMAGE=us-central1-docker.pkg.dev/%s/capstone/fastapi:latest\n' "$GCP_PROJECT_ID" >> .env.cloud
          NODE1_EXTERNAL_IP="$(gcloud compute instances describe node1-control --zone="$GCP_ZONE" --project="$GCP_PROJECT_ID" --format='get(networkInterfaces[0].accessConfigs[0].natIP)')"
          printf 'DASHBOARD_PORT=3001\n' >> .env.cloud
          printf 'NEXT_PUBLIC_API_BASE_URL=http://%s:8000\n' "$NODE1_EXTERNAL_IP" >> .env.cloud
          printf 'IS_TRAIN_OFFLINE=false\n' >> .env.cloud
          chmod 600 .env.cloud
          gcloud storage cp .env.cloud gs://big-data-group-4-bronze/env/.env.cloud
          echo "SUCCESS: .env.cloud uploaded."

      - name: Create deploy source archive
        run: |
          git archive --format=tar.gz --output traffic-src.tar.gz HEAD
          ls -lh traffic-src.tar.gz

      # -------------------------------------------------------
      # Step 4: Deploy Node 1 (Control Plane - Standard VM)
      # -------------------------------------------------------
      - name: Deploy to Node 1 (Control Plane)
        run: |
          echo "Deploying to Node 1 (Standard VM)..."
          BRANCH="${{ github.ref_name }}"

          SSH_USER="${{ vars.HUNG_SSH_USER }}"
          SSH_USER="${SSH_USER:-runner}"
          NODE1_IP=$(gcloud compute instances describe node1-control \
            --zone=$GCP_ZONE \
            --project=$GCP_PROJECT_ID \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "Node 1 IP: $NODE1_IP"
          for attempt in $(seq 1 18); do
            if ssh -i ~/.ssh/hung_vm_key \
              -o IdentitiesOnly=yes \
              -o PreferredAuthentications=publickey \
              -o PubkeyAuthentication=yes \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=15 \
              "${SSH_USER}@${NODE1_IP}" "echo SSH_READY_NODE1"; then
              break
            fi
            echo "Node 1 SSH is not ready yet (${attempt}/18). Waiting for metadata propagation."
            sleep 10
            if [ "${attempt}" = "18" ]; then
              echo "ERROR: Node 1 SSH did not become ready after metadata update."
              exit 1
            fi
          done

          if ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE1_IP}" 'TRAINING_PID_FILE="/opt/traffic/logs/cloud_h2o_before_2020.pid"; if [ -f "${TRAINING_PID_FILE}" ] && ps -p "$(cat "${TRAINING_PID_FILE}")" >/dev/null 2>&1; then echo "NODE1_BOOTSTRAP_ACTIVE $(cat "${TRAINING_PID_FILE}")"; exit 0; fi; exit 1'; then
            echo "Node 1 bootstrap training is already active. Skipping deploy sync/restart to avoid interrupting it."
            exit 0
          fi

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE1_IP}" "rm -f ~/traffic.env.cloud" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            .env.cloud "${SSH_USER}@${NODE1_IP}:~/traffic.env.cloud"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE1_IP}" "rm -f ~/traffic-inter-node.key" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            ~/.ssh/hung_vm_key "${SSH_USER}@${NODE1_IP}:~/traffic-inter-node.key"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE1_IP}" "rm -f ~/traffic-src.tar.gz" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            traffic-src.tar.gz "${SSH_USER}@${NODE1_IP}:~/traffic-src.tar.gz"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE1_IP}" "BRANCH='${BRANCH}' bash -s" << 'EOF'
            set -e
            APT_CACHE_UPDATED=0

            apt_install_if_missing() {
              if [ "${APT_CACHE_UPDATED}" -eq 0 ]; then
                sudo apt-get update
                APT_CACHE_UPDATED=1
              fi
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y "$@"
            }

            ensure_cmd() {
              local cmd_name="$1"
              local pkg_name="$2"
              if command -v "${cmd_name}" >/dev/null 2>&1; then
                return 0
              fi
              echo "Installing missing dependency: ${pkg_name}"
              apt_install_if_missing "${pkg_name}"
            }

            ensure_docker_compose() {
              if docker compose version >/dev/null 2>&1; then
                return 0
              fi
              if command -v docker-compose >/dev/null 2>&1; then
                return 0
              fi
              echo "Installing missing dependency: docker-compose-plugin"
              apt_install_if_missing docker-compose-plugin
            }

            ensure_cmd curl curl
            ensure_cmd docker docker.io
            ensure_cmd rsync rsync
            ensure_docker_compose

            echo "=== Syncing deployment source bundle into /opt/traffic ==="
            DEPLOY_SRC_DIR="${HOME}/traffic-deploy-src"
            rm -rf "${DEPLOY_SRC_DIR}"
            mkdir -p "${DEPLOY_SRC_DIR}"
            tar -xzf "${HOME}/traffic-src.tar.gz" -C "${DEPLOY_SRC_DIR}"
            sudo mkdir -p /opt/traffic /opt/traffic/secrets /opt/traffic/logs
            sudo rsync -a --delete \
              --exclude '.git/' \
              --exclude '.env' \
              --exclude '.env.cloud' \
              --exclude '.env.cloud.bak.*' \
              --exclude '.venv-node1/' \
              --exclude '.venv-node3/' \
              --exclude 'secrets/' \
              --exclude 'data/' \
              --exclude 'logs/' \
              --exclude '__pycache__/' \
              "${DEPLOY_SRC_DIR}/" /opt/traffic/
            sudo chown -R "$(whoami):$(whoami)" /opt/traffic

            echo "=== Loading cloud environment ==="
            sudo install -D -m 600 ~/traffic.env.cloud /opt/traffic/.env.cloud
            sudo install -D -m 600 ~/traffic.env.cloud /opt/traffic/.env
            sudo install -D -m 600 ~/traffic-inter-node.key /opt/traffic/secrets/inter_node_google_compute_engine

            echo "=== Starting Node 1 services and offline training bootstrap ==="
            TRAINING_PID_FILE="/opt/traffic/logs/cloud_h2o_before_2020.pid"
            if [ -f "${TRAINING_PID_FILE}" ] && ps -p "$(cat "${TRAINING_PID_FILE}")" >/dev/null 2>&1; then
                echo "Active full H2O training detected. Skipping Node 1 service restart to avoid interrupting MLflow tracking."
                echo "Training PID: $(cat "${TRAINING_PID_FILE}")"
                echo "Node 1 deployment is considered successful because the active full-training run owns MLflow until it completes."
                exit 0
            else
                sudo -E bash scripts/gcp/run-node1.sh
            fi

            echo "=== Verifying Node 1 containers are running ==="
            cd /opt/traffic/deployment/node1-control
            sudo docker compose ps
            required_services="node1-postgres node1-mlflow node1-fastapi node1-dashboard-frontend"
            for svc in ${required_services}; do
              if ! sudo docker ps --format '{{.Names}}' | grep -q "^${svc}$"; then
                echo "ERROR: Expected container is not running: ${svc}"
                exit 1
              fi
            done
          EOF

          echo "Node 1 deployment completed."

      # -------------------------------------------------------
      # Step 5: Deploy Node 2 (Streaming - Spot VM)
      # Only if Spot VM is currently running
      # -------------------------------------------------------
      - name: Deploy to Node 2 (Streaming)
        if: ${{ vars.DEPLOY_STREAMING == 'true' }}
        run: |
          echo "Deploying to Node 2 (Spot VM)..."
          BRANCH="${{ github.ref_name }}"

          SSH_USER="${{ vars.HUNG_SSH_USER }}"
          SSH_USER="${SSH_USER:-runner}"
          NODE2_IP=$(gcloud compute instances describe node2-streaming \
            --zone=$GCP_ZONE \
            --project=$GCP_PROJECT_ID \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "Node 2 IP: $NODE2_IP"
          for attempt in $(seq 1 18); do
            if ssh -i ~/.ssh/hung_vm_key \
              -o IdentitiesOnly=yes \
              -o PreferredAuthentications=publickey \
              -o PubkeyAuthentication=yes \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=15 \
              "${SSH_USER}@${NODE2_IP}" "echo SSH_READY_NODE2"; then
              break
            fi
            echo "Node 2 SSH is not ready yet (${attempt}/18). Waiting for metadata propagation."
            sleep 10
            if [ "${attempt}" = "18" ]; then
              echo "ERROR: Node 2 SSH did not become ready after metadata update."
              exit 1
            fi
          done

          if ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE2_IP}" 'for svc in node2-kafka-1 node2-kafka-2 node2-kafka-3 node2-flink-python-job node2-tomtom-live-consumer; do docker ps --format "{{.Names}}" | grep -q "^${svc}$" || exit 1; done; curl -sf http://localhost:8081/jobs >/dev/null'; then
            echo "Node 2 streaming services are already active. Skipping deploy restart to preserve in-flight replay."
            exit 0
          fi

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE2_IP}" "rm -f ~/traffic.env.cloud" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            .env.cloud "${SSH_USER}@${NODE2_IP}:~/traffic.env.cloud"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE2_IP}" "rm -f ~/traffic-src.tar.gz" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            traffic-src.tar.gz "${SSH_USER}@${NODE2_IP}:~/traffic-src.tar.gz"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE2_IP}" "BRANCH='${BRANCH}' bash -s" << 'EOF'
            set -e
            APT_CACHE_UPDATED=0

            apt_install_if_missing() {
              if [ "${APT_CACHE_UPDATED}" -eq 0 ]; then
                sudo apt-get update
                APT_CACHE_UPDATED=1
              fi
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y "$@"
            }

            ensure_cmd() {
              local cmd_name="$1"
              local pkg_name="$2"
              if command -v "${cmd_name}" >/dev/null 2>&1; then
                return 0
              fi
              echo "Installing missing dependency: ${pkg_name}"
              apt_install_if_missing "${pkg_name}"
            }

            ensure_docker_compose() {
              if docker compose version >/dev/null 2>&1; then
                return 0
              fi
              if command -v docker-compose >/dev/null 2>&1; then
                return 0
              fi
              echo "Installing missing dependency: docker-compose-plugin"
              apt_install_if_missing docker-compose-plugin
            }

            ensure_cmd curl curl
            ensure_cmd docker docker.io
            ensure_cmd rsync rsync
            ensure_docker_compose

            echo "=== Syncing deployment source bundle into /opt/traffic ==="
            DEPLOY_SRC_DIR="${HOME}/traffic-deploy-src"
            rm -rf "${DEPLOY_SRC_DIR}"
            mkdir -p "${DEPLOY_SRC_DIR}"
            tar -xzf "${HOME}/traffic-src.tar.gz" -C "${DEPLOY_SRC_DIR}"
            sudo mkdir -p /opt/traffic
            sudo rsync -a --delete \
              --exclude '.git/' \
              --exclude '.env' \
              --exclude '.env.cloud' \
              --exclude '.env.cloud.bak.*' \
              --exclude '.venv-node1/' \
              --exclude '.venv-node3/' \
              --exclude 'secrets/' \
              --exclude 'data/' \
              --exclude 'logs/' \
              --exclude '__pycache__/' \
              "${DEPLOY_SRC_DIR}/" /opt/traffic/
            sudo chown -R "$(whoami):$(whoami)" /opt/traffic

            echo "=== Restarting streaming services ==="
            sudo install -D -m 600 ~/traffic.env.cloud /opt/traffic/.env.cloud
            sudo install -D -m 600 ~/traffic.env.cloud /opt/traffic/.env
            sudo -E bash scripts/gcp/run-node2.sh

            echo "=== Verifying Node 2 containers are running ==="
            cd /opt/traffic/deployment/node2-streaming
            sudo docker compose ps
            required_services="node2-kafka-1 node2-kafka-2 node2-kafka-3 node2-flink-python-job"
            for svc in ${required_services}; do
              if ! sudo docker ps --format '{{.Names}}' | grep -q "^${svc}$"; then
                echo "ERROR: Expected container is not running: ${svc}"
                exit 1
              fi
            done
          EOF

          echo "Node 2 deployment completed."

      # -------------------------------------------------------
      # Step 6: Deploy Node 3 (Batch - Spot VM)
      # Only if Spot VM is currently running
      # -------------------------------------------------------
      - name: Deploy to Node 3 (Batch)
        if: ${{ vars.DEPLOY_BATCH == 'true' }}
        run: |
          echo "Deploying to Node 3 (Spot VM)..."
          BRANCH="${{ github.ref_name }}"

          SSH_USER="${{ vars.HUNG_SSH_USER }}"
          SSH_USER="${SSH_USER:-runner}"
          NODE3_IP=$(gcloud compute instances describe node3-batch \
            --zone=$GCP_ZONE \
            --project=$GCP_PROJECT_ID \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "Node 3 IP: $NODE3_IP"
          for attempt in $(seq 1 18); do
            if ssh -i ~/.ssh/hung_vm_key \
              -o IdentitiesOnly=yes \
              -o PreferredAuthentications=publickey \
              -o PubkeyAuthentication=yes \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=15 \
              "${SSH_USER}@${NODE3_IP}" "echo SSH_READY_NODE3"; then
              break
            fi
            echo "Node 3 SSH is not ready yet (${attempt}/18). Waiting for metadata propagation."
            sleep 10
            if [ "${attempt}" = "18" ]; then
              echo "ERROR: Node 3 SSH did not become ready after metadata update."
              exit 1
            fi
          done

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE3_IP}" "rm -f ~/traffic.env.cloud" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            .env.cloud "${SSH_USER}@${NODE3_IP}:~/traffic.env.cloud"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE3_IP}" "rm -f ~/traffic-src.tar.gz" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            traffic-src.tar.gz "${SSH_USER}@${NODE3_IP}:~/traffic-src.tar.gz"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE3_IP}" "BRANCH='${BRANCH}' bash -s" << 'EOF'
            set -e
            APT_CACHE_UPDATED=0

            apt_install_if_missing() {
              if [ "${APT_CACHE_UPDATED}" -eq 0 ]; then
                sudo apt-get update
                APT_CACHE_UPDATED=1
              fi
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y "$@"
            }

            ensure_cmd() {
              local cmd_name="$1"
              local pkg_name="$2"
              if command -v "${cmd_name}" >/dev/null 2>&1; then
                return 0
              fi
              echo "Installing missing dependency: ${pkg_name}"
              apt_install_if_missing "${pkg_name}"
            }

            ensure_docker_compose() {
              if docker compose version >/dev/null 2>&1; then
                return 0
              fi
              if command -v docker-compose >/dev/null 2>&1; then
                return 0
              fi
              echo "Installing missing dependency: docker-compose-plugin"
              apt_install_if_missing docker-compose-plugin
            }

            ensure_cmd curl curl
            ensure_cmd docker docker.io
            ensure_cmd rsync rsync
            ensure_docker_compose

            echo "=== Syncing deployment source bundle into /opt/traffic ==="
            DEPLOY_SRC_DIR="${HOME}/traffic-deploy-src"
            rm -rf "${DEPLOY_SRC_DIR}"
            mkdir -p "${DEPLOY_SRC_DIR}"
            tar -xzf "${HOME}/traffic-src.tar.gz" -C "${DEPLOY_SRC_DIR}"
            sudo mkdir -p /opt/traffic
            sudo rsync -a --delete \
              --exclude '.git/' \
              --exclude '.env' \
              --exclude '.env.cloud' \
              --exclude '.env.cloud.bak.*' \
              --exclude '.venv-node1/' \
              --exclude '.venv-node3/' \
              --exclude 'secrets/' \
              --exclude 'data/' \
              --exclude 'logs/' \
              --exclude '__pycache__/' \
              "${DEPLOY_SRC_DIR}/" /opt/traffic/
            sudo chown -R "$(whoami):$(whoami)" /opt/traffic

            if pgrep -af 'scripts/gcp/run-node3.sh|spark-submit|h2o_after_2020.py' >/dev/null 2>&1; then
                echo "Active Node 3 batch/retraining work detected. Skipping deploy restart to avoid interrupting the current pipeline."
                pgrep -af 'scripts/gcp/run-node3.sh|spark-submit|h2o_after_2020.py' || true
                exit 0
            fi

            echo "=== Restarting batch services ==="
            sudo install -D -m 600 ~/traffic.env.cloud /opt/traffic/.env.cloud
            sudo install -D -m 600 ~/traffic.env.cloud /opt/traffic/.env
            sudo -E bash scripts/gcp/run-node3.sh

            echo "=== Verifying Node 3 containers are running ==="
            cd /opt/traffic/deployment/node3-batch
            sudo docker compose ps
            required_services="node3-spark-master node3-spark-worker-1"
            for svc in ${required_services}; do
              if ! sudo docker ps --format '{{.Names}}' | grep -q "^${svc}$"; then
                echo "ERROR: Expected container is not running: ${svc}"
                exit 1
              fi
            done
          EOF

          echo "Node 3 deployment completed."

      - name: Cleanup deploy secrets
        if: always()
        run: |
          rm -f .env.cloud traffic-src.tar.gz ~/.ssh/hung_vm_key
