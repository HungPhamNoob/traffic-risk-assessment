# ============================================================
# .github/workflows/ci-cd.yaml
# CI/CD Pipeline for Road Accident Risk Analysis Platform
# ============================================================
# Triggers:
#   - Push to main/develop/hung1 -> run full pipeline
#   - Pull request to main/develop/hung1 -> run lint + test only
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, hung1 ]
  pull_request:
    branches: [ main, develop, hung1 ]

concurrency:
  group: traffic-cicd-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# Environment variables (not secrets)
# ============================================================
env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  GCP_ZONE: us-central1-a

# ============================================================
# Jobs
# ============================================================
jobs:

  # ==========================================================
  # Job 1: Lint and Test
  # Runs on every push and pull request
  # ==========================================================
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code from repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python and dependencies
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.3.0 flake8 pytest pytest-cov pandas numpy pyyaml requests python-dotenv
          pip install fastapi email-validator pydantic pydantic-settings prometheus-client psycopg2-binary scikit-learn pyarrow

      # Step 3: Check code formatting with Black
      - name: Check code formatting (Black)
        run: |
          black --check . --exclude='(\.git|\.venv|\.venv-cicd|venv|vendor|data|ml/notebooks|node_modules|dashboard/frontend/node_modules)' || {
            echo "Black found formatting issues. Run 'black .' locally to fix."
            exit 1
          }

      # Step 4: Check code style with Flake8
      - name: Check code style (Flake8)
        run: |
          flake8 . --exclude=venv,.venv,.venv-cicd,vendor,data,ml/notebooks,node_modules,dashboard/frontend/node_modules --max-line-length=120 --extend-ignore=E203,W503,W605

      # Step 5: Run unit tests
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      # Step 6: Check Python syntax without importing heavy runtime services
      - name: Compile Python files
        run: |
          python -m compileall dashboard/backend/app processing ingestion ml/dataset ml/training orchestration -q

      # Step 7: Validate Docker Compose files used by local and GCP deployments
      - name: Validate Docker Compose files
        run: |
          docker compose --env-file .env.example --file docker-compose.yaml config --quiet
          docker compose --env-file .env.cloud --file deployment/node1-control/docker-compose.yaml config --quiet
          docker compose --env-file .env.cloud --file deployment/node2-streaming/docker-compose.yaml config --quiet
          docker compose --env-file .env.cloud --file deployment/node3-batch/docker-compose.yaml config --quiet

  # ==========================================================
  # Job 2: Build Docker Images
  # Only runs on push to main/develop (not on pull requests)
  # ==========================================================
  build-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository
        run: |
          if ! gcloud artifacts repositories describe capstone \
            --location="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud artifacts repositories create capstone \
              --repository-format=docker \
              --location="${GCP_REGION}" \
              --description="Capstone Docker images" \
              --project="${GCP_PROJECT_ID}"
          fi

      # Step 3: Login to Google Artifact Registry (Docker)
      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      # Step 4: Build and push FastAPI image
      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard/backend
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/capstone/fastapi:${{ github.sha }}
            us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/capstone/fastapi:latest

  # ==========================================================
  # Job 3: Deploy to Cloud VMs
  # Only runs on push to main/develop/hung1
  # ==========================================================
  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      # Step 3: Setup gcloud CLI
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure GCP infrastructure
        run: |
          bash scripts/gcp/setup_gcp.sh

      - name: Prepare VM SSH key
        env:
          HUNG_SSH_PRIVATE_KEY: ${{ secrets.HUNG_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          python - <<'PY'
          import os
          from pathlib import Path

          key = os.environ["HUNG_SSH_PRIVATE_KEY"].strip()
          if "\\n" in key and "\n" not in key:
              key = key.replace("\\n", "\n")
          key = key.replace("\r\n", "\n").replace("\r", "\n")
          if not key.endswith("\n"):
              key += "\n"

          key_path = Path.home() / ".ssh" / "hung_vm_key"
          key_path.write_text(key, encoding="utf-8")
          key_path.chmod(0o600)
          PY
          ssh-keygen -y -f ~/.ssh/hung_vm_key >/dev/null
          echo "SUCCESS: VM SSH key installed and parsed for deploy job."

      - name: Install VM SSH public keys
        run: |
          SSH_USER="${{ vars.HUNG_SSH_USER }}"
          SSH_USER="${SSH_USER:-runner}"
          PUBLIC_KEY="$(ssh-keygen -y -f ~/.ssh/hung_vm_key)"

          for VM_NAME in node1-control node2-streaming node3-batch; do
            echo "Installing deploy public key for ${SSH_USER}@${VM_NAME}."
            gcloud compute instances add-metadata "${VM_NAME}" \
              --zone="${GCP_ZONE}" \
              --project="${GCP_PROJECT_ID}" \
              --metadata="enable-oslogin=FALSE,block-project-ssh-keys=TRUE,ssh-keys=${SSH_USER}:${PUBLIC_KEY} ${SSH_USER}"
          done

          echo "SUCCESS: VM SSH metadata now matches HUNG_SSH_PRIVATE_KEY."

      - name: Upload .env.cloud to GCS
        run: |
          echo "=== Uploading .env.cloud to GCS ==="
          echo '${{ secrets.ENV_CLOUD }}' > .env.cloud
          {
            printf '\n# CI/CD deployment overrides. These values keep stale GitHub secret content from pointing VMs at retired buckets.\n'
            NODE1_INTERNAL_IP="$(gcloud compute instances describe node1-control --zone="$GCP_ZONE" --project="$GCP_PROJECT_ID" --format='get(networkInterfaces[0].networkIP)')"
            NODE2_INTERNAL_IP="$(gcloud compute instances describe node2-streaming --zone="$GCP_ZONE" --project="$GCP_PROJECT_ID" --format='get(networkInterfaces[0].networkIP)')"
            NODE3_INTERNAL_IP="$(gcloud compute instances describe node3-batch --zone="$GCP_ZONE" --project="$GCP_PROJECT_ID" --format='get(networkInterfaces[0].networkIP)')"
            printf 'GCP_PROJECT_ID=%s\n' "$GCP_PROJECT_ID"
            printf 'GCS_BUCKET_BRONZE=big-data-group-4-bronze\n'
            printf 'GCS_BUCKET_SILVER=big-data-group-4-silver\n'
            printf 'GCS_BUCKET_GOLD=big-data-group-4-gold\n'
            printf 'NODE1_INTERNAL_IP=%s\n' "$NODE1_INTERNAL_IP"
            printf 'NODE2_INTERNAL_IP=%s\n' "$NODE2_INTERNAL_IP"
            printf 'NODE3_INTERNAL_IP=%s\n' "$NODE3_INTERNAL_IP"
            printf 'POSTGRES_HOST=%s\n' "$NODE1_INTERNAL_IP"
            printf 'POSTGRES_US_PREDICTION_TABLE=traffic_risk_predictions\n'
            printf 'POSTGRES_TOMTOM_TABLE=traffic_tomtom_incidents\n'
            printf 'US_TRAIN_OFFLINE_PATH=gs://big-data-group-4-bronze/process/us_train_offline_before_2020.csv\n'
            printf 'US_PIPELINE_REPLAY_PATH=gs://big-data-group-4-bronze/process/us_pipeline_from_2020.csv\n'
            printf 'SILVER_FEATURES_PATH=gs://big-data-group-4-silver/process/flink_features\n'
            printf 'GOLD_RETRAIN_PATH=gs://big-data-group-4-gold/features/retrain\n'
            printf 'GOLD_RETRAIN_PARQUET_PATH=gs://big-data-group-4-gold/features/retrain/parquet\n'
            printf 'GOLD_RETRAIN_CSV_PATH=gs://big-data-group-4-gold/features/retrain/csv\n'
            printf 'MLFLOW_TRACKING_URI=http://%s:5000\n' "$NODE1_INTERNAL_IP"
            printf 'MLFLOW_ARTIFACT_ROOT=gs://big-data-group-4-ml-artifacts\n'
            printf 'MLFLOW_SERVING_ENDPOINT=http://%s:5001/invocations\n' "$NODE1_INTERNAL_IP"
            printf 'MLFLOW_GUNICORN_TIMEOUT_SECONDS=300\n'
            printf 'MLFLOW_GUNICORN_WORKERS=2\n'
            printf 'TOMTOM_BBOXES=US:New_York:-74.25909,40.477399,-73.700181,40.917577\n'
          } >> .env.cloud
          printf '\nFASTAPI_IMAGE=us-central1-docker.pkg.dev/%s/capstone/fastapi:latest\n' "$GCP_PROJECT_ID" >> .env.cloud
          NODE1_EXTERNAL_IP="$(gcloud compute instances describe node1-control --zone="$GCP_ZONE" --project="$GCP_PROJECT_ID" --format='get(networkInterfaces[0].accessConfigs[0].natIP)')"
          printf 'DASHBOARD_PORT=3001\n' >> .env.cloud
          printf 'NEXT_PUBLIC_API_BASE_URL=http://%s:8000\n' "$NODE1_EXTERNAL_IP" >> .env.cloud
          printf 'IS_TRAIN_OFFLINE=false\n' >> .env.cloud
          chmod 600 .env.cloud
          gcloud storage cp .env.cloud gs://big-data-group-4-bronze/env/.env.cloud
          echo "SUCCESS: .env.cloud uploaded."

      # -------------------------------------------------------
      # Step 4: Deploy Node 1 (Control Plane - Standard VM)
      # -------------------------------------------------------
      - name: Deploy to Node 1 (Control Plane)
        run: |
          echo "Deploying to Node 1 (Standard VM)..."
          BRANCH="${{ github.ref_name }}"

          SSH_USER="${{ vars.HUNG_SSH_USER }}"
          SSH_USER="${SSH_USER:-runner}"
          NODE1_IP=$(gcloud compute instances describe node1-control \
            --zone=$GCP_ZONE \
            --project=$GCP_PROJECT_ID \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "Node 1 IP: $NODE1_IP"
          for attempt in $(seq 1 18); do
            if ssh -i ~/.ssh/hung_vm_key \
              -o IdentitiesOnly=yes \
              -o PreferredAuthentications=publickey \
              -o PubkeyAuthentication=yes \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=15 \
              "${SSH_USER}@${NODE1_IP}" "echo SSH_READY_NODE1"; then
              break
            fi
            echo "Node 1 SSH is not ready yet (${attempt}/18). Waiting for metadata propagation."
            sleep 10
            if [ "${attempt}" = "18" ]; then
              echo "ERROR: Node 1 SSH did not become ready after metadata update."
              exit 1
            fi
          done

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE1_IP}" "sudo rm -f /tmp/.env.cloud" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            .env.cloud "${SSH_USER}@${NODE1_IP}:/tmp/.env.cloud"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE1_IP}" "bash -s" << EOF
            set -e

            echo "=== Pulling latest code from Git ==="

            # Fix Git permissions (in case sudo was used before)
            sudo chown -R \$(whoami):\$(whoami) /opt/traffic 2>/dev/null || true
            git config --global --add safe.directory /opt/traffic 2>/dev/null || true

            if [ ! -d /opt/traffic/.git ]; then
                echo "=== First deployment: cloning repository ==="
                sudo rm -rf /opt/traffic 2>/dev/null || true
                sudo mkdir -p /opt/traffic
                sudo chown -R \$(whoami):\$(whoami) /opt/traffic
                git clone https://github.com/HungPhamNoob/traffic-risk-assessment.git /opt/traffic
                cd /opt/traffic
                git checkout $BRANCH
            else
                echo "=== Repository exists: force-syncing deployment worktree ==="
                cd /opt/traffic
                # CI owns the VM deployment checkout. Force-sync it so stale VM edits,
                # generated files, or partial previous deployments cannot block releases.
                git fetch --prune origin
                git reset --hard
                git clean -fd -e data/ -e logs/ -e .venv-node1/ -e .venv-node3/
                git checkout -B "$BRANCH" "origin/$BRANCH"
                git reset --hard "origin/$BRANCH"
                git clean -fd -e data/ -e logs/ -e .venv-node1/ -e .venv-node3/
            fi

            echo "=== Loading cloud environment ==="
            cp /tmp/.env.cloud /opt/traffic/.env.cloud
            cp /tmp/.env.cloud /opt/traffic/.env

            echo "=== Starting Node 1 services and offline training bootstrap ==="
            TRAINING_PID_FILE="/opt/traffic/logs/cloud_h2o_before_2020.pid"
            if [ -f "\${TRAINING_PID_FILE}" ] && ps -p "\$(cat "\${TRAINING_PID_FILE}")" >/dev/null 2>&1; then
                echo "Active full H2O training detected. Skipping Node 1 service restart to avoid interrupting MLflow tracking."
                echo "Training PID: \$(cat "\${TRAINING_PID_FILE}")"
                echo "Node 1 deployment is considered successful because the active full-training run owns MLflow until it completes."
                exit 0
            else
                sudo -E bash scripts/gcp/run-node1.sh
            fi

            echo "=== Waiting for services to be healthy ==="
            sleep 45

            echo "=== Checking service health ==="
            cd /opt/traffic/deployment/node1-control
            sudo docker compose ps
          EOF

          echo "Node 1 deployment completed."

      # -------------------------------------------------------
      # Step 5: Deploy Node 2 (Streaming - Spot VM)
      # Only if Spot VM is currently running
      # -------------------------------------------------------
      - name: Deploy to Node 2 (Streaming)
        if: \${{ vars.DEPLOY_STREAMING == 'true' }}
        run: |
          echo "Deploying to Node 2 (Spot VM)..."
          BRANCH="\${{ github.ref_name }}"

          SSH_USER="\${{ vars.HUNG_SSH_USER }}"
          SSH_USER="\${SSH_USER:-runner}"
          NODE2_IP=\$(gcloud compute instances describe node2-streaming \
            --zone=\$GCP_ZONE \
            --project=\$GCP_PROJECT_ID \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "Node 2 IP: \$NODE2_IP"
          for attempt in \$(seq 1 18); do
            if ssh -i ~/.ssh/hung_vm_key \
              -o IdentitiesOnly=yes \
              -o PreferredAuthentications=publickey \
              -o PubkeyAuthentication=yes \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=15 \
              "\${SSH_USER}@\${NODE2_IP}" "echo SSH_READY_NODE2"; then
              break
            fi
            echo "Node 2 SSH is not ready yet (\${attempt}/18). Waiting for metadata propagation."
            sleep 10
            if [ "\${attempt}" = "18" ]; then
              echo "ERROR: Node 2 SSH did not become ready after metadata update."
              exit 1
            fi
          done

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "\${SSH_USER}@\${NODE2_IP}" "sudo rm -f /tmp/.env.cloud" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            .env.cloud "\${SSH_USER}@\${NODE2_IP}:/tmp/.env.cloud"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "\${SSH_USER}@\${NODE2_IP}" "bash -s" << EOF
            set -e

            echo "=== Pulling latest code ==="
            # Normalize ownership and trust for the deployment checkout. Older
            # startup scripts may have created /opt/traffic with root ownership.
            sudo chown -R \$(whoami):\$(whoami) /opt/traffic 2>/dev/null || true
            git config --global --add safe.directory /opt/traffic 2>/dev/null || true

            if [ ! -d /opt/traffic/.git ]; then
                echo "=== First deployment: cloning repository ==="
                sudo rm -rf /opt/traffic 2>/dev/null || true
                sudo mkdir -p /opt/traffic
                sudo chown -R \$(whoami):\$(whoami) /opt/traffic
                git clone https://github.com/HungPhamNoob/traffic-risk-assessment.git /opt/traffic
                cd /opt/traffic
                git checkout \$BRANCH
            else
                echo "=== Repository exists: force-syncing deployment worktree ==="
                cd /opt/traffic
                # CI owns the VM deployment checkout. Force-sync it so stale VM edits,
                # generated files, or partial previous deployments cannot block releases.
                git fetch --prune origin
                git reset --hard
                git clean -fd -e data/ -e logs/ -e .venv-node1/ -e .venv-node3/
                git checkout -B "\$BRANCH" "origin/\$BRANCH"
                git reset --hard "origin/\$BRANCH"
                git clean -fd -e data/ -e logs/ -e .venv-node1/ -e .venv-node3/
            fi

            echo "=== Restarting streaming services ==="
            cp /tmp/.env.cloud /opt/traffic/.env.cloud
            cp /tmp/.env.cloud /opt/traffic/.env
            sudo -E bash scripts/gcp/run-node2.sh

            echo "=== Waiting for services ==="
            sleep 20

            cd /opt/traffic/deployment/node2-streaming
            sudo docker compose ps
          EOF

          echo "Node 2 deployment completed."

      # -------------------------------------------------------
      # Step 6: Deploy Node 3 (Batch - Spot VM)
      # Only if Spot VM is currently running
      # -------------------------------------------------------
      - name: Deploy to Node 3 (Batch)
        if: \${{ vars.DEPLOY_BATCH == 'true' }}
        run: |
          echo "Deploying to Node 3 (Spot VM)..."

          SSH_USER="\${{ vars.HUNG_SSH_USER }}"
          SSH_USER="\${SSH_USER:-runner}"
          NODE3_IP=\$(gcloud compute instances describe node3-batch \
            --zone=\$GCP_ZONE \
            --project=\$GCP_PROJECT_ID \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "Node 3 IP: \$NODE3_IP"
          for attempt in \$(seq 1 18); do
            if ssh -i ~/.ssh/hung_vm_key \
              -o IdentitiesOnly=yes \
              -o PreferredAuthentications=publickey \
              -o PubkeyAuthentication=yes \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=15 \
              "\${SSH_USER}@\${NODE3_IP}" "echo SSH_READY_NODE3"; then
              break
            fi
            echo "Node 3 SSH is not ready yet (\${attempt}/18). Waiting for metadata propagation."
            sleep 10
            if [ "\${attempt}" = "18" ]; then
              echo "ERROR: Node 3 SSH did not become ready after metadata update."
              exit 1
            fi
          done

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "\${SSH_USER}@\${NODE3_IP}" "sudo rm -f /tmp/.env.cloud" || true

          scp -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            .env.cloud "\${SSH_USER}@\${NODE3_IP}:/tmp/.env.cloud"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "\${SSH_USER}@\${NODE3_IP}" "bash -s" << EOF
            set -e

            echo "=== Pulling latest code ==="
            BRANCH="\${{ github.ref_name }}"
            # Normalize ownership and trust for the deployment checkout. Older
            # startup scripts may have created /opt/traffic with root ownership.
            sudo chown -R \$(whoami):\$(whoami) /opt/traffic 2>/dev/null || true
            git config --global --add safe.directory /opt/traffic 2>/dev/null || true

            if [ ! -d /opt/traffic/.git ]; then
                echo "=== First deployment: cloning repository ==="
                sudo rm -rf /opt/traffic 2>/dev/null || true
                sudo mkdir -p /opt/traffic
                sudo chown -R \$(whoami):\$(whoami) /opt/traffic
                git clone https://github.com/HungPhamNoob/traffic-risk-assessment.git /opt/traffic
                cd /opt/traffic
                git checkout \$BRANCH
            else
                echo "=== Repository exists: force-syncing deployment worktree ==="
                cd /opt/traffic
                # CI owns the VM deployment checkout. Force-sync it so stale VM edits,
                # generated files, or partial previous deployments cannot block releases.
                git fetch --prune origin
                git reset --hard
                git clean -fd -e data/ -e logs/ -e .venv-node1/ -e .venv-node3/
                git checkout -B "\$BRANCH" "origin/\$BRANCH"
                git reset --hard "origin/\$BRANCH"
                git clean -fd -e data/ -e logs/ -e .venv-node1/ -e .venv-node3/
            fi

            echo "=== Restarting batch services ==="
            cp /tmp/.env.cloud /opt/traffic/.env.cloud
            cp /tmp/.env.cloud /opt/traffic/.env
            sudo -E bash scripts/gcp/run-node3.sh

            echo "=== Waiting for services ==="
            sleep 20

            cd /opt/traffic/deployment/node3-batch
            sudo docker compose ps
          EOF

          echo "Node 3 deployment completed."

      - name: Cleanup deploy secrets
        if: always()
        run: |
          rm -f .env.cloud ~/.ssh/hung_vm_key

  # ==========================================================
  # Job 4: Smoke Test
  # Quick check that all services are reachable after deploy
  # ==========================================================
  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Prepare VM SSH key
        env:
          HUNG_SSH_PRIVATE_KEY: ${{ secrets.HUNG_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          python - <<'PY'
          import os
          from pathlib import Path

          key = os.environ["HUNG_SSH_PRIVATE_KEY"].strip()
          if "\\n" in key and "\n" not in key:
              key = key.replace("\\n", "\n")
          key = key.replace("\r\n", "\n").replace("\r", "\n")
          if not key.endswith("\n"):
              key += "\n"

          key_path = Path.home() / ".ssh" / "hung_vm_key"
          key_path.write_text(key, encoding="utf-8")
          key_path.chmod(0o600)
          PY
          ssh-keygen -y -f ~/.ssh/hung_vm_key >/dev/null
          echo "SUCCESS: VM SSH key installed and parsed for smoke tests."

      - name: Run smoke tests
        run: |
          echo "=== Getting Node 1 IP ==="
          SSH_USER="${{ vars.HUNG_SSH_USER }}"
          SSH_USER="${SSH_USER:-runner}"
          NODE1_IP=$(gcloud compute instances describe node1-control \
            --zone=$GCP_ZONE \
            --project=$GCP_PROJECT_ID \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "Node 1 IP: $NODE1_IP"

          ssh -i ~/.ssh/hung_vm_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "${SSH_USER}@${NODE1_IP}" "bash -s" << 'EOF'
            set -euo pipefail

            check_url() {
              local service_name="$1"
              local url="$2"

              echo "=== Testing ${service_name}: ${url} ==="
              for attempt in $(seq 1 18); do
                if curl -fsS "${url}" >/tmp/smoke-response.txt; then
                  echo "${service_name}: OK"
                  cat /tmp/smoke-response.txt
                  echo ""
                  return 0
                fi
                echo "${service_name}: not ready yet (${attempt}/18)."
                sleep 10
              done

              echo "ERROR: ${service_name} did not become healthy."
              return 1
            }

            check_url "Airflow" "http://localhost:8080/health"
            check_url "MLflow" "http://localhost:5000/health"
            check_url "FastAPI" "http://localhost:8000/health"
          EOF

          echo ""
          echo "=== All smoke tests completed ==="

      - name: Cleanup smoke-test secrets
        if: always()
        run: |
          rm -f ~/.ssh/hung_vm_key
