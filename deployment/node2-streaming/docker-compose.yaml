# ============================================================
# Node 2 - Streaming (Spot VM)
# 3 Kafka Brokers + Flink + Redis
# Topic: traffic.us.raw (1 partition, 3 replicas)
# ============================================================

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: node2-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: -Xms128m -Xmx512m
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - capstone-net
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep 'Mode:'"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  # ==========================================================
  # 3 Kafka Brokers
  # ==========================================================
  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: node2-kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:29092,EXTERNAL://${NODE2_INTERNAL_IP:-10.128.0.5}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: -Xms256m -Xmx768m
    volumes:
      - kafka_data_1:/var/lib/kafka/data
    networks:
      - capstone-net
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: node2-kafka-2
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:29092,EXTERNAL://${NODE2_INTERNAL_IP:-10.128.0.5}:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: -Xms256m -Xmx768m
    volumes:
      - kafka_data_2:/var/lib/kafka/data
    networks:
      - capstone-net
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: node2-kafka-3
    ports:
      - "9094:9092"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:29092,EXTERNAL://${NODE2_INTERNAL_IP:-10.128.0.5}:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: -Xms256m -Xmx768m
    volumes:
      - kafka_data_3:/var/lib/kafka/data
    networks:
      - capstone-net
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  kafka-topic-init:
    # Long-running topic guard. It creates and validates the single project
    # topic, then stays alive so operators do not mistake a successful one-shot
    # exit for a crash in Docker Compose dashboards.
    image: confluentinc/cp-kafka:7.6.0
    container_name: node2-kafka-topic-init
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
    command: |
      bash -ec '
        BOOTSTRAP_SERVERS="$${KAFKA_BOOTSTRAP_SERVERS}"
        TOPIC_NAME="$${KAFKA_TOPIC_RAW}"

        echo "Waiting for Kafka brokers at $${BOOTSTRAP_SERVERS}."
        for i in $(seq 1 30); do
          if kafka-broker-api-versions --bootstrap-server "$${BOOTSTRAP_SERVERS}" >/dev/null 2>&1; then
            break
          fi
          echo "Kafka not ready yet ($${i}/30)."
          sleep 2
        done

        if ! kafka-broker-api-versions --bootstrap-server "$${BOOTSTRAP_SERVERS}" >/dev/null 2>&1; then
          echo "Kafka brokers not reachable after waiting. Exiting for restart."
          exit 1
        fi

        echo "Creating Kafka topic $${TOPIC_NAME} with one partition and three replicas."
        kafka-topics --bootstrap-server "$${BOOTSTRAP_SERVERS}" --create --if-not-exists --topic "$${TOPIC_NAME}" --partitions 1 --replication-factor 3

        echo "Validating Kafka topic $${TOPIC_NAME}."
        kafka-topics --bootstrap-server "$${BOOTSTRAP_SERVERS}" --describe --topic "$${TOPIC_NAME}"

        echo "Kafka topic init complete. Holding container open."
        tail -f /dev/null
      '
    networks:
      - capstone-net
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server \"$${KAFKA_BOOTSTRAP_SERVERS}\" --describe --topic \"$${KAFKA_TOPIC_RAW}\" >/dev/null 2>&1"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ==========================================================
  # 3 Producers - row_index modulo split avoids duplicate replay rows.
  # ==========================================================
  producer-1:
    image: python:3.10-slim
    container_name: node2-producer-0
    working_dir: /app
    command: >
      bash -c "
      pip install --no-cache-dir confluent-kafka python-dotenv gcsfs google-auth &&
      python us_replay_producer.py
      "
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      STREAM_MAX_RECORDS: ${STREAM_MAX_RECORDS:-0}
      STREAM_THROTTLE_SECONDS: ${STREAM_THROTTLE_SECONDS:-0.01}
      TOTAL_PRODUCERS: ${TOTAL_PRODUCERS:-3}
      PRODUCER_INDEX: "0"
      PRODUCER_FLUSH_EVERY_N_RECORDS: ${PRODUCER_FLUSH_EVERY_N_RECORDS:-5000}
      US_PIPELINE_REPLAY_PATH: ${US_PIPELINE_REPLAY_PATH:-gs://big-data-group-4-bronze/process/us_pipeline_from_2020.csv}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../ingestion/kafka/us_producer.py:/app/us_replay_producer.py:ro
      - ${GCP_SERVICE_ACCOUNT_KEY:-/dev/null}:/secrets/gcp-key.json:ro
    networks:
      - capstone-net
    depends_on:
      kafka-topic-init:
        condition: service_healthy
    restart: "no"

  producer-2:
    image: python:3.10-slim
    container_name: node2-producer-1
    working_dir: /app
    command: >
      bash -c "
      pip install --no-cache-dir confluent-kafka python-dotenv gcsfs google-auth &&
      python us_replay_producer.py
      "
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      US_PIPELINE_REPLAY_PATH: ${US_PIPELINE_REPLAY_PATH:-gs://big-data-group-4-bronze/process/us_pipeline_from_2020.csv}
      STREAM_MAX_RECORDS: ${STREAM_MAX_RECORDS:-0}
      STREAM_THROTTLE_SECONDS: ${STREAM_THROTTLE_SECONDS:-0.01}
      TOTAL_PRODUCERS: ${TOTAL_PRODUCERS:-3}
      PRODUCER_INDEX: "1"
      PRODUCER_FLUSH_EVERY_N_RECORDS: ${PRODUCER_FLUSH_EVERY_N_RECORDS:-5000}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../ingestion/kafka/us_producer.py:/app/us_replay_producer.py:ro
      - ${GCP_SERVICE_ACCOUNT_KEY:-/dev/null}:/secrets/gcp-key.json:ro
    networks:
      - capstone-net
    depends_on:
      kafka-topic-init:
        condition: service_healthy
    restart: "no"

  producer-3:
    image: python:3.10-slim
    container_name: node2-producer-2
    working_dir: /app
    command: >
      bash -c "
      pip install --no-cache-dir confluent-kafka python-dotenv gcsfs google-auth &&
      python us_replay_producer.py
      "
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      US_PIPELINE_REPLAY_PATH: ${US_PIPELINE_REPLAY_PATH:-gs://big-data-group-4-bronze/process/us_pipeline_from_2020.csv}
      STREAM_MAX_RECORDS: ${STREAM_MAX_RECORDS:-0}
      STREAM_THROTTLE_SECONDS: ${STREAM_THROTTLE_SECONDS:-0.01}
      TOTAL_PRODUCERS: ${TOTAL_PRODUCERS:-3}
      PRODUCER_INDEX: "2"
      PRODUCER_FLUSH_EVERY_N_RECORDS: ${PRODUCER_FLUSH_EVERY_N_RECORDS:-5000}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../ingestion/kafka/us_producer.py:/app/us_replay_producer.py:ro
      - ${GCP_SERVICE_ACCOUNT_KEY:-/dev/null}:/secrets/gcp-key.json:ro
    networks:
      - capstone-net
    depends_on:
      kafka-topic-init:
        condition: service_healthy
    restart: "no"

  # ==========================================================
  # Flink JobManager
  # ==========================================================
  flink-jobmanager:
    image: flink:1.19-scala_2.12
    container_name: node2-flink-jm
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        state.checkpoints.dir: ${FLINK_CHECKPOINT_DIR:-gs://big-data-group-4-backups/checkpoints/flink}
        execution.checkpointing.interval: ${FLINK_CHECKPOINT_INTERVAL:-30000}
    volumes:
      - ../..:/opt/traffic:ro
      - flink_data:/opt/flink/checkpoints
    networks:
      - capstone-net
    depends_on:
      kafka-topic-init:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    restart: on-failure

  flink-taskmanager:
    image: flink:1.19-scala_2.12
    container_name: node2-flink-tm
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1536m
        state.checkpoints.dir: ${FLINK_CHECKPOINT_DIR:-gs://big-data-group-4-backups/checkpoints/flink}
    volumes:
      - ../..:/opt/traffic:ro
      - flink_data:/opt/flink/checkpoints
    networks:
      - capstone-net
    depends_on:
      - flink-jobmanager
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: node2-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - capstone-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  flink-python-job:
    image: python:3.10-slim
    container_name: node2-flink-python-job
    working_dir: /opt/traffic
    command: >
      bash -c "
        apt-get update &&
        apt-get install -y --no-install-recommends default-jre-headless &&
        rm -rf /var/lib/apt/lists/* &&
        pip install --no-cache-dir apache-flink==1.19.0 psycopg2-binary requests python-dotenv gcsfs google-auth &&
        python processing/flink_streaming.py
      "
    environment:
      PYTHONPATH: /opt/traffic
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_TOPIC_RAW: ${KAFKA_TOPIC_RAW:-traffic.us.raw}
      FLINK_INFERENCE_GROUP: ${FLINK_INFERENCE_GROUP:-flink-us-inference}
      FLINK_CHECKPOINT_INTERVAL: ${FLINK_CHECKPOINT_INTERVAL:-30000}
      FLINK_CHECKPOINT_DIR: ${FLINK_CHECKPOINT_DIR:-gs://big-data-group-4-backups/checkpoints/flink}
      SILVER_FEATURES_PATH: ${SILVER_FEATURES_PATH:-gs://big-data-group-4-silver/process/flink_features}
      MLFLOW_SERVING_ENDPOINT: ${MLFLOW_SERVING_ENDPOINT:-http://10.128.0.4:5001/invocations}
      POSTGRES_HOST: ${POSTGRES_HOST:-10.128.0.4}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-capstone_db}
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_PREDICTION_TABLE: ${POSTGRES_PREDICTION_TABLE:-traffic_risk_predictions}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../..:/opt/traffic:ro
      - ${GCP_SERVICE_ACCOUNT_KEY:-/dev/null}:/secrets/gcp-key.json:ro
    networks:
      - capstone-net
    depends_on:
      kafka-topic-init:
        condition: service_healthy
      flink-jobmanager:
        condition: service_started
    restart: on-failure

networks:
  capstone-net:
    driver: bridge
    name: capstone-net

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data_1:
  kafka_data_2:
  kafka_data_3:
  flink_data:
  redis_data:
