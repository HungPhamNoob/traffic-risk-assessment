version: '3.8'

# deployment/node3-batch/docker-compose.yml
services:
  spark-master:
    image: apache/spark:3.5.0  # ✅ Apache official
    container_name: node3-spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../processing/spark:/opt/spark/work-dir:ro  # ✅ Fix: bitnami → spark
      - ../../data:/data:ro
      - spark_master_data:/opt/spark/work-dir/checkpoints  # ✅ Separate volume for master
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/secrets/gcp-key.json:ro
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  spark-worker:
    image: apache/spark:3.5.0  # ✅ Cùng tag với master
    container_name: node3-spark-worker
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8083:8081"  # ✅ Worker UI: internal 8081 → external 8083
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=5g
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../processing/spark:/opt/spark/work-dir:ro  # ✅ Fix: bitnami → spark
      - ../../data:/data:ro
      - spark_worker_data:/opt/spark/work-dir/checkpoints  # ✅ Separate volume for worker
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/secrets/gcp-key.json:ro
    depends_on:
      - spark-master
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: '2.0'
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  capstone-net:
    driver: bridge
    name: capstone-net

volumes:
  spark_master_data:   # ✅ Separate volumes
  spark_worker_data: