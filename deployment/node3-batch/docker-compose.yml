version: '3.8'

services:
  spark-master:
    image: bitnami/spark:3.5.1
    container_name: node3-spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../processing/spark:/opt/bitnami/spark/work-dir:ro
      - ../../data:/data:ro
      - spark_data:/opt/bitnami/spark/work-dir/checkpoints
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/secrets/gcp-key.json:ro
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  spark-worker:
    image: bitnami/spark:3.5.1
    container_name: node3-spark-worker
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../processing/spark:/opt/bitnami/spark/work-dir:ro
      - ../../data:/data:ro
      - spark_data:/opt/bitnami/spark/work-dir/checkpoints
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/secrets/gcp-key.json:ro
    depends_on:
      - spark-master
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 3G
      cpus: '2.0'
    restart: on-failure
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  capstone-net:
    driver: bridge
    name: capstone-net

volumes:
  spark_data:
