version: '3.8'

services:
  spark-master:
    image: bitnami/spark:3.5
    container_name: node3-spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080" # Master UI
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../processing/spark:/opt/bitnami/spark/work-dir:ro
      - ../../data:/data:ro
      - spark_data:/opt/bitnami/spark/work-dir/checkpoints
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/secrets/gcp-key.json:ro
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 1G  # ✅ Tối ưu: Master không cần nhiều RAM
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  spark-worker:
    image: bitnami/spark:3.5.1
    container_name: node3-spark-worker
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8083:8081" # ✅ Fix: Map Worker UI (nội bộ là 8081) ra 8083 theo tài liệu
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=5g # ✅ Tăng RAM cho Worker để chạy Sedona mượt hơn
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../processing/spark:/opt/bitnami/spark/work-dir:ro
      - ../../data:/data:ro
      - spark_data:/opt/bitnami/spark/work-dir/checkpoints
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/secrets/gcp-key.json:ro
    depends_on:
      - spark-master
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 5G # ✅ Cấp tối đa có thể cho worker
          cpus: '2.0'
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081"] # ✅ Thêm healthcheck
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  capstone-net:
    driver: bridge
    name: capstone-net

volumes:
  spark_data: