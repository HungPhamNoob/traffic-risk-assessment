services:
  spark-master:
    image: bitnami/spark:3.5  # ✅ Tag hợp lệ cho Bitnami
    container_name: node3-spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../processing/spark:/opt/bitnami/spark/work-dir:ro  # ✅ Bitnami path
      - ../../data:/data:ro
      - spark_master_data:/checkpoints  # ✅ Mount đơn giản ở root, tránh read-only
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/secrets/gcp-key.json:ro
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  spark-worker:
    image: bitnami/spark:3.5  # ✅ Cùng tag với master
    container_name: node3-spark-worker
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8083:8081"  # ✅ Worker UI: internal 8081 → external 8083
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=5g
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../processing/spark:/opt/bitnami/spark/work-dir:ro  # ✅ Bitnami path
      - ../../data:/data:ro
      - spark_worker_data:/checkpoints  # ✅ Mount đơn giản ở root
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/secrets/gcp-key.json:ro
    depends_on:
      - spark-master
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: '2.0'
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  capstone-net:
    driver: bridge
    name: capstone-net

volumes:
  spark_master_data:  # ✅ Separate volumes cho master/worker
  spark_worker_data: