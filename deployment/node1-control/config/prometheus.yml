global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node1:9100', 'node2:9100', 'node3:9100']
  
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  # Airflow metrics
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow:8080']
    metrics_path: '/metrics'
  
  # Flink metrics
  - job_name: 'flink'
    static_configs:
      - targets: ['node2:8081']
    metrics_path: '/metrics'
  
  # Spark metrics (via Prometheus servlet)
  - job_name: 'spark'
    static_configs:
      - targets: ['node3:8080']
    metrics_path: '/metrics/executors/prometheus/'
  
  # Kafka metrics (via JMX exporter)
  - job_name: 'kafka'
    static_configs:
      - targets: ['node2:9308']
  
  # Custom business metrics endpoint
  - job_name: 'business-metrics'
    static_configs:
      - targets: ['node1:8000']  # FastAPI app
    metrics_path: '/metrics'