services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: node1-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      POSTGRES_DB: ${POSTGRES_DB:-capstone_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-capstone} -d ${POSTGRES_DB:-capstone_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
  
  airflow-db:
    image: postgres:15-alpine
    container_name: node1-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow123
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capstone-net
    deploy:
      resources:
        limits: { memory: 512M }
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  airflow:
    image: apache/airflow:2.9.0-python3.10
    container_name: node1-airflow
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow123@airflow-db/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_USER:-admin}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_PASSWORD:-admin}
      - PROJECT_ROOT=/opt/traffic
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../orchestration/dags:/opt/airflow/dags:ro
      - ../../orchestration/logs:/opt/airflow/logs
      - ../..:/opt/traffic:ro
      - ../../data:/data:ro
      - ${GCP_SERVICE_ACCOUNT_KEY:-/dev/null}:/secrets/gcp-key.json:ro
    ports:
      - "8080:8080"
    command: >
      bash -c "
        set -e;
        airflow db migrate || airflow db init;
        airflow users create --username $${AIRFLOW_USER:-admin} --password $${AIRFLOW_PASSWORD:-admin} --firstname Admin --lastname User --role Admin --email admin@local 2>/dev/null || true;
        airflow scheduler &
        exec airflow webserver -p 8080
      "
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 3.5G
          cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: node1-blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ../../config/monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    networks:
      - capstone-net
    deploy:
      resources:
        limits: { memory: 128M }
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: node1-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../../config/monitoring/prometheus.cloud.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-30}d"
    depends_on:
      - blackbox-exporter
    networks:
      - capstone-net
    deploy:
      resources:
        limits: { memory: 512M }
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  grafana:
    image: grafana/grafana:10.4.1
    container_name: node1-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../config/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - capstone-net
    deploy:
      resources:
        limits: { memory: 512M }
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: node1-mlflow
    ports:
      - "5000:5000"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../ml/mlruns:/mlruns
      - ${GCP_SERVICE_ACCOUNT_KEY:-/dev/null}:/secrets/gcp-key.json:ro
    command: >
      mlflow server 
      --host 0.0.0.0 --port 5000 
      -w ${MLFLOW_GUNICORN_WORKERS:-2}
      --backend-store-uri sqlite:////mlruns/mlflow.db 
      --default-artifact-root ${MLFLOW_ARTIFACT_ROOT:-gs://capstone-data-lake/mlflow-artifacts}/
      --gunicorn-opts "--timeout ${MLFLOW_GUNICORN_TIMEOUT_SECONDS:-300}"
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 1G
    restart: on-failure
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  mlflow-serving:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: node1-mlflow-serving
    ports:
      - "5001:5001"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ../../ml/mlruns:/mlruns
      - ${GCP_SERVICE_ACCOUNT_KEY:-/dev/null}:/secrets/gcp-key.json:ro
    command: >
      bash -c "
        apt-get update &&
        apt-get install -y --no-install-recommends openjdk-17-jre-headless &&
        rm -rf /var/lib/apt/lists/* &&
        pip install --no-cache-dir h2o==3.46.0.6 pandas numpy scikit-learn google-auth google-cloud-storage &&
        MODEL_NAME=\"${ML_MODEL_NAME:-traffic-risk-model}\"
        echo 'Waiting for MLflow tracking server to be healthy...'
        while ! curl --max-time 5 -fsS http://mlflow:5000/health >/dev/null 2>&1; do
          echo '  MLflow not ready yet. Sleeping 5s.'
          sleep 5
        done
        echo 'MLflow is healthy. Looking for registered models...'
        while true; do
          FOUND=\"\"
          if curl --max-time 10 -fsS \"http://mlflow:5000/api/2.0/mlflow/registered-models/get?name=\$MODEL_NAME\" >/dev/null 2>&1; then
            FOUND=\"\$MODEL_NAME\"
          else
            REG_LIST=\$(curl -s --max-time 10 http://mlflow:5000/api/2.0/mlflow/registered-models/list 2>/dev/null)
            FIRST_MODEL=\$(echo \"\$REG_LIST\" | python3 -c \"import json,sys; d=json.load(sys.stdin); print(d['registered_models'][0]['name']) if d.get('registered_models') else sys.exit(1)\" 2>/dev/null)
            if [ -n \"\$FIRST_MODEL\" ]; then
              FOUND=\"\$FIRST_MODEL\"
            fi
          fi
          if [ -n \"\$FOUND\" ]; then
            echo \"Serving model: \$FOUND\"
            mlflow models serve -m \"models:/\$FOUND/latest\" -h 0.0.0.0 -p 5001 -t ${MLFLOW_SERVING_TIMEOUT_SECONDS:-300} --env-manager local || {
              echo 'Model serving exited. Retrying in 10s...'
              sleep 10
            }
          else
            echo 'No registered model found in MLflow. Waiting 15s before retry...'
            sleep 15
          fi
        done
      "
    depends_on:
      - mlflow
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 2G
    restart: on-failure
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  fastapi:
    build:
      context: ../../dashboard/backend
      dockerfile: Dockerfile
    image: us-central1-docker.pkg.dev/big-data-group-4/capstone/fastapi:latest
    container_name: node1-fastapi
    ports:
      - "8000:8000"
    environment:
      - ENV=${ENV:-production}
      - POSTGRES_USER=${POSTGRES_USER:-capstone}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme123}
      - POSTGRES_DB=${POSTGRES_DB:-capstone_db}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_PREDICTION_TABLE=${POSTGRES_PREDICTION_TABLE:-traffic_risk_predictions}
      - POSTGRES_US_PREDICTION_TABLE=${POSTGRES_US_PREDICTION_TABLE:-traffic_risk_predictions}
      - POSTGRES_TOMTOM_TABLE=${POSTGRES_TOMTOM_TABLE:-traffic_tomtom_incidents}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_SERVING_ENDPOINT=http://mlflow-serving:5001/invocations
      - ML_MODEL_NAME=${ML_MODEL_NAME:-traffic-risk-model}
      - KAFKA_TOPIC_RAW=${KAFKA_TOPIC_RAW:-traffic.us.raw}
      - FLINK_CHECKPOINT_DIR=${FLINK_CHECKPOINT_DIR:-gs://big-data-group-4-backups/checkpoints/flink}
      - FLINK_CHECKPOINT_INTERVAL=${FLINK_CHECKPOINT_INTERVAL:-30000}
      - GOLD_RETRAIN_PATH=${GOLD_RETRAIN_PATH:-gs://big-data-group-4-gold/features/retrain}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - capstone-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  dashboard-frontend:
    image: node:20-alpine
    container_name: node1-dashboard-frontend
    working_dir: /app
    command: >
      sh -c "
        npm ci &&
        npm run build &&
        npm run start
      "
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://35.224.149.110:8000}
    volumes:
      - ../../dashboard/frontend:/app
      - dashboard_next_cache:/tmp/next-cache
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - capstone-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    
networks:
  capstone-net:
    name: capstone-net
    external: true

volumes:
  postgres_data:
  airflow_pg_data:
  prometheus_data:
  grafana_data:
  dashboard_next_cache:
